name: External Background Worker
run-name: external-background-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.runner_target || inputs.runner_target || 'github_runner' }}-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ticket_id || inputs.ticket_id || github.run_id }}

on:
  workflow_dispatch:
    inputs:
      runner_target:
        description: "External runner target"
        required: true
        default: "github_runner"
        type: choice
        options:
          - github_runner
      team_dir:
        description: "Team dir inside the checkout"
        required: true
        default: ".aoe-team"
        type: string
      ticket_id:
        description: "Background ticket id to process; blank processes the next eligible handoff"
        required: false
        default: ""
        type: string
      bundle_b64:
        description: "Optional base64 bundle from aoe-github-runner-bridge.py export-bundle"
        required: false
        default: ""
        type: string
      timeout_sec:
        description: "Command timeout in seconds"
        required: true
        default: "900"
        type: string
      max_items:
        description: "Maximum handoffs to process"
        required: true
        default: "1"
        type: string
      commit_results:
        description: "Force-commit result sidecars back to the branch"
        required: true
        default: false
        type: boolean
      comment_issue_number:
        description: "Optional issue/PR number to receive workflow completion status"
        required: false
        default: ""
        type: string
  repository_dispatch:
    types:
      - aoe-external-background-worker

permissions:
  contents: read

jobs:
  worker-run:
    name: github-runner-worker
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: external-background-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ticket_id || inputs.ticket_id || github.run_id }}
      cancel-in-progress: false
    env:
      AOE_RUNNER_TARGET: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.runner_target || inputs.runner_target || 'github_runner' }}
      AOE_TEAM_DIR: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.team_dir || inputs.team_dir || '.aoe-team' }}
      AOE_TICKET_ID: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ticket_id || inputs.ticket_id || '' }}
      AOE_TIMEOUT_SEC: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.timeout_sec || inputs.timeout_sec || '900' }}
      AOE_MAX_ITEMS: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.max_items || inputs.max_items || '1' }}
      AOE_BUNDLE_B64: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.bundle_b64 || inputs.bundle_b64 || '' }}
      AOE_COMMIT_RESULTS: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.commit_results || inputs.commit_results || false }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Preflight transport policy
        run: |
          python3 scripts/gateway/aoe-github-runner-bridge.py policy-check \
            --runner "$AOE_RUNNER_TARGET" \
            --team-dir "$AOE_TEAM_DIR" \
            --event-name "$GITHUB_EVENT_NAME" \
            --commit-results "$AOE_COMMIT_RESULTS" \
            --bundle-present "$([ -n "$AOE_BUNDLE_B64" ] && echo true || echo false)" \
            --timeout-sec "$AOE_TIMEOUT_SEC" \
            --max-items "$AOE_MAX_ITEMS"

      - name: Materialize handoff bundle
        if: env.AOE_BUNDLE_B64 != ''
        run: |
          printf '%s' "$AOE_BUNDLE_B64" > "$RUNNER_TEMP/aoe-external-worker.b64"
          python3 scripts/gateway/aoe-github-runner-bridge.py materialize-bundle \
            --bundle-file "$RUNNER_TEMP/aoe-external-worker.b64" \
            --output-root "$GITHUB_WORKSPACE" \
            --team-dir "$AOE_TEAM_DIR"

      - name: Run external background worker
        run: |
          python3 scripts/gateway/aoe-background-worker.py worker-run \
            --runner "$AOE_RUNNER_TARGET" \
            --team-dir "$AOE_TEAM_DIR" \
            --ticket-id "$AOE_TICKET_ID" \
            --timeout-sec "$AOE_TIMEOUT_SEC" \
            --max-items "$AOE_MAX_ITEMS"

      - name: Upload worker sidecars
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aoe-external-background-${{ env.AOE_RUNNER_TARGET }}-${{ env.AOE_TICKET_ID || github.run_id }}
          if-no-files-found: warn
          path: |
            ${{ env.AOE_TEAM_DIR }}/background_run_acks/**
            ${{ env.AOE_TEAM_DIR }}/background_run_results/**
            ${{ env.AOE_TEAM_DIR }}/background_run_logs/**

  commit-result-sidecars:
    name: commit-worker-sidecars
    needs: worker-run
    if: ${{ always() && ((github.event_name == 'repository_dispatch' && (github.event.client_payload.commit_results == true || github.event.client_payload.commit_results == 'true')) || (github.event_name == 'workflow_dispatch' && (inputs.commit_results == true || inputs.commit_results == 'true'))) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: write
    env:
      AOE_RUNNER_TARGET: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.runner_target || inputs.runner_target || 'github_runner' }}
      AOE_TEAM_DIR: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.team_dir || inputs.team_dir || '.aoe-team' }}
      AOE_TICKET_ID: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ticket_id || inputs.ticket_id || '' }}
      AOE_TIMEOUT_SEC: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.timeout_sec || inputs.timeout_sec || '900' }}
      AOE_MAX_ITEMS: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.max_items || inputs.max_items || '1' }}
      AOE_COMMIT_RESULTS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Preflight transport policy
        run: |
          python3 scripts/gateway/aoe-github-runner-bridge.py policy-check \
            --runner "$AOE_RUNNER_TARGET" \
            --team-dir "$AOE_TEAM_DIR" \
            --event-name "$GITHUB_EVENT_NAME" \
            --commit-results "$AOE_COMMIT_RESULTS" \
            --bundle-present false \
            --timeout-sec "$AOE_TIMEOUT_SEC" \
            --max-items "$AOE_MAX_ITEMS"

      - name: Download worker sidecars
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: aoe-external-background-${{ env.AOE_RUNNER_TARGET }}-${{ env.AOE_TICKET_ID || github.run_id }}
          path: ${{ runner.temp }}/aoe-worker-sidecars

      - name: Commit result sidecars
        run: |
          download_root="$RUNNER_TEMP/aoe-worker-sidecars"
          if [ ! -d "$download_root" ]; then
            echo "No worker sidecar artifact was downloaded."
            exit 0
          fi
          mkdir -p "$AOE_TEAM_DIR"
          staged=0
          for dirname in background_run_acks background_run_results background_run_logs; do
            while IFS= read -r -d '' source_dir; do
              mkdir -p "$AOE_TEAM_DIR/$dirname"
              cp -R "$source_dir"/. "$AOE_TEAM_DIR/$dirname"/
              staged=1
            done < <(find "$download_root" -type d -name "$dirname" -print0)
          done
          if [ "$staged" -eq 0 ]; then
            echo "No worker sidecars to stage."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for path in "$AOE_TEAM_DIR/background_run_acks" "$AOE_TEAM_DIR/background_run_results" "$AOE_TEAM_DIR/background_run_logs"; do
            if [ -e "$path" ]; then
              git add -f "$path"
            fi
          done
          if git diff --cached --quiet; then
            echo "No worker sidecars to commit."
            exit 0
          fi
          git commit -m "Record external background worker result ${AOE_TICKET_ID:-batch}"
          git push

  comment-worker-result:
    name: comment-worker-result
    needs: worker-run
    if: ${{ always() && ((github.event_name == 'repository_dispatch' && github.event.client_payload.comment_issue_number != null && github.event.client_payload.comment_issue_number != '') || (github.event_name == 'workflow_dispatch' && inputs.comment_issue_number != '')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      issues: write
    env:
      AOE_RUNNER_TARGET: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.runner_target || inputs.runner_target || 'github_runner' }}
      AOE_TEAM_DIR: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.team_dir || inputs.team_dir || '.aoe-team' }}
      AOE_TICKET_ID: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ticket_id || inputs.ticket_id || '' }}
      AOE_COMMENT_ISSUE_NUMBER: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.comment_issue_number || inputs.comment_issue_number || '' }}
      AOE_WORKER_RESULT: ${{ needs.worker-run.result }}
      AOE_ARTIFACT_NAME: aoe-external-background-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.runner_target || inputs.runner_target || 'github_runner' }}-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.ticket_id || inputs.ticket_id || github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build completion comment
        run: |
          python3 scripts/gateway/aoe-github-runner-bridge.py completion-comment \
            --ticket-id "$AOE_TICKET_ID" \
            --runner "$AOE_RUNNER_TARGET" \
            --team-dir "$AOE_TEAM_DIR" \
            --run-id "$GITHUB_RUN_ID" \
            --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --artifact-name "$AOE_ARTIFACT_NAME" \
            --worker-result "$AOE_WORKER_RESULT" \
            --comment-issue-number "$AOE_COMMENT_ISSUE_NUMBER" \
            --response-file "$RUNNER_TEMP/aoe-worker-completion.md"

      - name: Comment worker result
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "$AOE_COMMENT_ISSUE_NUMBER" \
            --body-file "$RUNNER_TEMP/aoe-worker-completion.md"
