{% if buttons %}
<div class="action-block">
  {% if title %}<p><strong>{{ title }}</strong></p>{% endif %}
  <div class="action-toolbar">
    {% for button in buttons %}
    <form class="action-form" data-dashboard-action data-action-label="{{ button.label }}" data-action-command="{{ button.command }}" data-action-mode="{{ button.mode }}" {% if button.mode == 'phase2' %}data-action-confirm="true" data-action-confirm-message="{{ button.label }} will execute a phase2 action. Continue?"{% endif %} method="post" action="{{ button.path }}">
      <input type="hidden" name="payload_json" value="{{ button.payload_json }}">
      <button type="submit" class="action-button {{ button.mode }}">{{ button.label }}</button>
      <div class="action-meta">
        <code>{{ button.command }}</code>
        {% if button.note %}<span class="muted">{{ button.note }}</span>{% endif %}
      </div>
    </form>
    {% endfor %}
  </div>
</div>
{% endif %}
