[book]
title = "Forager"
description = "Offdesk agent orchestration with approvals, recovery, and audit trails"
authors = ["Forager Contributors"]
language = "en"
src = "docs"

[build]
build-dir = "book"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/kimyoungjin06/forager-cli"
edit-url-template = "https://github.com/kimyoungjin06/forager-cli/edit/main/docs/{path}"
additional-css = ["theme/css/custom.css"]

[output.html.fold]
enable = true
level = 1
